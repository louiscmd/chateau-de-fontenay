
<meta charset="UTF-8">
<title>Château de Fontenay</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F6F4EF;
  --ink: #1A1816;
  --stone: #E2DAD0;
  --stone-dk: #C4BAB0;
  --wine: #5C1A2E;
  --ivy: #243D30;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#151310; --ink:#EAE6DF; --stone:#2E2A25; --stone-dk:#221F1A; }
}
:root[data-theme="light"] { --bg:#F6F4EF; --ink:#1A1816; --stone:#E2DAD0; --stone-dk:#C4BAB0; }
:root[data-theme="dark"]  { --bg:#151310; --ink:#EAE6DF; --stone:#2E2A25; --stone-dk:#221F1A; }

html { scroll-behavior: auto; }
body { background: var(--bg); color: var(--ink); font-family: Georgia, serif; overflow-x: hidden; }

.scroll-driver { height: 500vh; position: relative; }

.sticky-scene {
  position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden;
}

/* ── HEADER ── */
.castle-header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: clamp(1.8rem, 5vh, 4rem);
  z-index: 10; pointer-events: none; text-align: center;
}
.eyebrow {
  font-family: system-ui, sans-serif; font-size: 0.68rem;
  letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.42;
  margin-bottom: 1.1rem; font-weight: 400;
}
.castle-title {
  font-size: clamp(2rem, 5.5vw, 4.5rem); font-weight: 400;
  line-height: 1.06; letter-spacing: -0.015em; text-wrap: balance;
}
.scroll-cue {
  font-family: system-ui, sans-serif; font-size: 0.65rem;
  letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.35;
  margin-top: 2rem; animation: nudge 2.5s ease-in-out infinite;
}
@keyframes nudge {
  0%,100% { transform: translateY(0); opacity: .35; }
  50%      { transform: translateY(5px); opacity: .62; }
}

/* ── CASTLE ── */
.castle-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end; justify-content: center;
  will-change: opacity;
}
.castle-svg {
  width: min(97vw, 1160px); height: auto; display: block;
  transform-origin: 50% 76%;
  will-change: transform;
}

/* ── INTERIOR ── */
.interior {
  position: absolute; inset: 0; opacity: 0; pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; background: var(--bg); z-index: 20;
}
.vault-svg { width: min(88vw, 820px); height: auto; flex-shrink: 0; }

.choice-intro {
  font-family: system-ui, sans-serif; font-size: 0.62rem;
  letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.38;
  margin: 1.4rem 0 0; text-align: center;
}

.choices {
  display: grid; grid-template-columns: 1fr 1px 1fr;
  width: min(88vw, 820px); margin-top: 0;
}
.divider-line { background: var(--ink); opacity: 0.15; margin: 1.5rem 0; }

.choice-card {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 2.5rem 1.5rem 2rem;
  text-decoration: none; color: var(--ink);
  transition: background 0.35s; cursor: pointer; position: relative;
  border-top: 1.5px solid var(--ink);
}
.choice-card:hover { background: var(--stone); }
.choice-card.wine:hover { background: color-mix(in srgb, var(--wine) 7%, var(--bg)); }
.choice-card.stay:hover { background: color-mix(in srgb, var(--ivy) 7%, var(--bg)); }

.choice-icon {
  width: 46px; height: 56px; margin-bottom: 1.2rem;
  transition: transform 0.3s ease;
}
.choice-card:hover .choice-icon { transform: translateY(-3px); }

.choice-card h2 {
  font-size: clamp(1.25rem, 2.5vw, 1.65rem); font-weight: 400;
  letter-spacing: 0.02em; margin-bottom: 0.45rem;
  transition: color 0.3s;
}
.choice-card.wine:hover h2 { color: var(--wine); }
.choice-card.stay:hover h2 { color: var(--ivy); }
.choice-card p {
  font-family: system-ui, sans-serif; font-size: 0.65rem;
  letter-spacing: 0.13em; text-transform: uppercase; opacity: 0.42; text-align: center;
}

.back-btn {
  position: fixed; top: 1.4rem; left: 1.4rem; z-index: 100;
  font-family: system-ui, sans-serif; font-size: 0.62rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  background: none; border: 1px solid currentColor;
  color: var(--ink); opacity: 0; padding: 0.45rem 0.9rem;
  cursor: pointer; pointer-events: none; transition: opacity 0.3s, background 0.2s;
}
.back-btn:hover { background: var(--stone); }

@media (prefers-reduced-motion: reduce) {
  .castle-svg { transition: none; }
  .scroll-cue { animation: none; }
}
@media (max-width: 540px) {
  .choices { grid-template-columns: 1fr; }
  .divider-line { height: 1px; width: 60%; margin: 0 auto; }
}
</style>

<script>
const hdr       = document.getElementById('hdr');
const castleWrap= document.getElementById('castleWrap');
const castleSvg = document.getElementById('castleSvg');
const interior  = document.getElementById('interior');
const backBtn   = document.getElementById('backBtn');
const driver    = document.getElementById('driver');

function eio(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

let raf = null;
function onScroll(){
  if(raf) return;
  raf = requestAnimationFrame(()=>{
    raf=null;
    const p = Math.max(0, Math.min(window.scrollY / (driver.offsetHeight - window.innerHeight), 1));

    hdr.style.opacity         = Math.max(0, 1 - p*6).toFixed(3);
    castleSvg.style.transform = `scale(${1 + eio(Math.min(p/.75,1)) * 13})`;
    castleWrap.style.opacity  = (p < .52 ? 1 : Math.max(0, 1-(p-.52)/.2)).toFixed(3);

    const iOp = p < .72 ? 0 : Math.min(1,(p-.72)/.22);
    interior.style.opacity    = iOp.toFixed(3);
    interior.style.pointerEvents = iOp>.5 ? 'all' : 'none';
    backBtn.style.opacity     = iOp.toFixed(3);
    backBtn.style.pointerEvents = iOp>.5 ? 'all' : 'none';
  });
}

window.addEventListener('scroll', onScroll, { passive:true });
onScroll();
</script>
