
<meta charset="UTF-8">
<title>Château de Fontenay</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF8;
  --ink: #1A1816;
  --stone: #EDEAE3;
  --stone-dk: #D4CFC5;
  --wine: #5C1A2E;
  --ivy: #243D30;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#141311; --ink:#E8E4DD; --stone:#252219; --stone-dk:#1E1C17; }
}
:root[data-theme="light"] { --bg:#FAFAF8; --ink:#1A1816; --stone:#EDEAE3; --stone-dk:#D4CFC5; }
:root[data-theme="dark"]  { --bg:#141311; --ink:#E8E4DD; --stone:#252219; --stone-dk:#1E1C17; }

html { scroll-behavior: auto; }
body { background: var(--bg); color: var(--ink); font-family: Georgia, serif; overflow-x: hidden; }

.scroll-driver { height: 500vh; position: relative; }
.sticky-scene  { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; }

/* ── HEADER ── */
.castle-header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: clamp(1.6rem, 4vh, 3.2rem);
  z-index: 10; pointer-events: none; text-align: center;
}
.eyebrow {
  font-family: system-ui, sans-serif; font-size: 0.66rem;
  letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.38;
  margin-bottom: 0.9rem;
}
.castle-title {
  font-size: clamp(1.8rem, 4.8vw, 4rem); font-weight: 400;
  line-height: 1.05; letter-spacing: -0.01em; text-wrap: balance;
}
.scroll-cue {
  font-family: system-ui, sans-serif; font-size: 0.62rem;
  letter-spacing: 0.26em; text-transform: uppercase; opacity: 0.32;
  margin-top: 1.6rem; animation: nudge 2.8s ease-in-out infinite;
}
@keyframes nudge {
  0%,100% { transform: translateY(0); opacity:.32; }
  50%      { transform: translateY(5px); opacity:.55; }
}

/* ── CASTLE ── */
.castle-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end; justify-content: center;
  will-change: opacity;
}
.castle-svg {
  width: min(98vw, 1100px); height: auto; display: block;
  transform-origin: 50% 90%;
  will-change: transform;
}

/* ── INTERIOR ── */
.interior {
  position: absolute; inset: 0; opacity: 0; pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; background: var(--bg); z-index: 20;
  gap: 0;
}

.choice-intro {
  font-family: system-ui, sans-serif; font-size: 0.6rem;
  letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.32;
  margin-bottom: 2.8rem; text-align: center;
}

.choices {
  display: grid; grid-template-columns: 1fr 1px 1fr;
  width: min(80vw, 700px);
}
.divider-line { background: var(--ink); opacity: 0.12; }

.choice-card {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 2.6rem 1.8rem 2.2rem;
  text-decoration: none; color: var(--ink);
  border-top: 1px solid color-mix(in srgb, var(--ink) 18%, transparent);
  transition: background 0.3s; cursor: pointer;
}
.choice-card:hover { background: color-mix(in srgb, var(--ink) 4%, transparent); }
.choice-card.wine:hover { background: color-mix(in srgb, var(--wine) 6%, var(--bg)); }
.choice-card.stay:hover { background: color-mix(in srgb, var(--ivy) 6%, var(--bg)); }

.choice-icon {
  width: 40px; height: 52px; margin-bottom: 1.1rem;
  transition: transform 0.3s ease;
}
.choice-card:hover .choice-icon { transform: translateY(-3px); }

.choice-card h2 {
  font-size: clamp(1.1rem, 2.2vw, 1.45rem); font-weight: 400;
  letter-spacing: 0.03em; margin-bottom: 0.35rem;
}
.choice-card.wine:hover h2 { color: var(--wine); }
.choice-card.stay:hover h2 { color: var(--ivy); }
.choice-card p {
  font-family: system-ui, sans-serif; font-size: 0.6rem;
  letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.38; text-align: center;
}

.back-btn {
  position: fixed; top: 1.3rem; left: 1.3rem; z-index: 100;
  font-family: system-ui, sans-serif; font-size: 0.6rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  background: none; border: 1px solid currentColor;
  color: var(--ink); opacity: 0; padding: 0.42rem 0.85rem;
  cursor: pointer; pointer-events: none; transition: opacity 0.3s, background 0.2s;
}
.back-btn:hover { background: var(--stone); }

@media (prefers-reduced-motion: reduce) {
  .castle-svg { transition: none; }
  .scroll-cue { animation: none; }
}
@media (max-width: 520px) {
  .choices { grid-template-columns: 1fr; }
  .divider-line { height: 1px; width: 50%; margin: 0 auto; }
}

<script>
const hdr        = document.getElementById('hdr');
const castleWrap = document.getElementById('castleWrap');
const castleSvg  = document.getElementById('castleSvg');
const interior   = document.getElementById('interior');
const backBtn    = document.getElementById('backBtn');
const driver     = document.getElementById('driver');

function eio(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

let raf = null;
function onScroll(){
  if(raf) return;
  raf = requestAnimationFrame(()=>{
    raf = null;
    const maxScroll = driver.offsetHeight - window.innerHeight;
    const p = Math.max(0, Math.min(window.scrollY / maxScroll, 1));

    // Header fades out in first 18% of scroll
    hdr.style.opacity = Math.max(0, 1 - p / 0.18).toFixed(3);

    // Castle zooms in (0–72%), then fades (72–88%)
    const zoomP = Math.min(p / 0.72, 1);
    const scale = 1 + eio(zoomP) * 15;
    castleSvg.style.transform = `scale(${scale})`;

    const wrapOp = p < 0.72 ? 1 : Math.max(0, 1 - (p - 0.72) / 0.16);
    castleWrap.style.opacity = wrapOp.toFixed(3);

    // Interior fades in (88–100%)
    const iOp = p < 0.88 ? 0 : Math.min(1, (p - 0.88) / 0.12);
    interior.style.opacity    = iOp.toFixed(3);
    interior.style.pointerEvents = iOp > 0.5 ? 'all' : 'none';
    backBtn.style.opacity        = iOp.toFixed(3);
    backBtn.style.pointerEvents  = iOp > 0.5 ? 'all' : 'none';
  });
}

window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
